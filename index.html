<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stop &amp; Learn</title>
  <link rel="icon" type="image/png" href="./logo-stop-learn-square.png">
  <link rel="apple-touch-icon" href="./logo-stop-learn-square.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f1a;
      --bg-elevated: rgba(20, 20, 36, 0.86);
      --surface: #17172a;
      --surface-strong: #1a1a2e;
      --surface-soft: rgba(255, 255, 255, 0.04);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f2f3f8;
      --muted: #a6accd;
      --accent: #7c5cbf;
      --accent-soft: rgba(124, 92, 191, 0.18);
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f97316;
      --yellow: #facc15;
      --blue: #38bdf8;
      --shadow: 0 24px 60px rgba(2, 6, 23, 0.38);
      --radius: 18px;
      --radius-sm: 12px;
      --transition: 0.2s ease;
      --sidebar-width: 272px;
      --sidebar-collapsed-width: 96px;
      --bottom-nav-height: 88px;
      --hour-height: 74px;
      --max-width: 1520px;
      --page-padding: 18px;
    }

    html[data-theme="light"] {
      --bg: #f2f3fb;
      --bg-elevated: rgba(255, 255, 255, 0.92);
      --surface: #ffffff;
      --surface-strong: #ffffff;
      --surface-soft: rgba(124, 92, 191, 0.08);
      --line: rgba(15, 23, 42, 0.08);
      --text: #171827;
      --muted: #5f6783;
      --accent: #7456c9;
      --accent-soft: rgba(116, 86, 201, 0.12);
      --shadow: 0 20px 48px rgba(71, 85, 105, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    html[data-theme="light"] {
      color-scheme: light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124, 92, 191, 0.28), transparent 26%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.12), transparent 28%),
        linear-gradient(160deg, rgba(255, 255, 255, 0.02), transparent 36%),
        var(--bg);
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 420px;
      height: 420px;
      border-radius: 999px;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.45;
    }

    body::before {
      top: -120px;
      right: -140px;
      background: rgba(124, 92, 191, 0.18);
    }

    body::after {
      bottom: -180px;
      left: -120px;
      background: rgba(56, 189, 248, 0.12);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
      color: inherit;
      transition: transform var(--transition), background var(--transition), color var(--transition), border-color var(--transition), box-shadow var(--transition), opacity var(--transition);
    }

    button:active {
      transform: scale(0.98);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .hidden {
      display: none !important;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    .sidebar {
      display: none;
      position: sticky;
      top: 0;
      align-self: flex-start;
      height: 100vh;
      width: var(--sidebar-width);
      padding: 24px 18px;
      background: rgba(11, 12, 24, 0.82);
      backdrop-filter: blur(18px);
      border-right: 1px solid var(--line);
      transition: width var(--transition), padding var(--transition), background var(--transition);
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: var(--sidebar-collapsed-width);
      padding-inline: 12px;
    }

    .sidebar.collapsed .brand-copy,
    .sidebar.collapsed .nav-label,
    .sidebar.collapsed .sidebar-footer-copy {
      opacity: 0;
      width: 0;
      overflow: hidden;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 8px 6px 20px;
    }

    .brand-main {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      padding: 3px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 36px rgba(56, 189, 248, 0.18);
      flex-shrink: 0;
    }

    .brand-mark img,
    .topbar-brand img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border-radius: inherit;
    }

    .brand-copy {
      min-width: 0;
      transition: opacity var(--transition);
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand-title,
    .topbar-title {
      margin: 0;
      font-size: 1.18rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-subtitle,
    .topbar-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--surface-soft);
      border: 1px solid transparent;
      flex-shrink: 0;
    }

    .icon-button:hover {
      background: var(--accent-soft);
      border-color: rgba(124, 92, 191, 0.28);
    }

    .nav-stack {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .nav-button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      color: var(--muted);
      border: 1px solid transparent;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .nav-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(124, 92, 191, 0.16), transparent 85%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-color: var(--line);
    }

    .nav-button.active {
      background: rgba(124, 92, 191, 0.16);
      color: var(--text);
      border-color: rgba(124, 92, 191, 0.38);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .nav-button.active::before {
      opacity: 1;
    }

    .nav-icon {
      width: 22px;
      flex-shrink: 0;
      text-align: center;
      font-size: 1.02rem;
    }

    .nav-label {
      font-weight: 600;
      white-space: nowrap;
      transition: opacity var(--transition);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 18px 8px 6px;
    }

    .sidebar-footer-card {
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(124, 92, 191, 0.16), rgba(56, 189, 248, 0.1));
      border: 1px solid rgba(124, 92, 191, 0.18);
    }

    .sidebar-footer-copy {
      transition: opacity var(--transition);
    }

    .sidebar-footer-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .main-shell {
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    .main-inner {
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 18px var(--page-padding) calc(var(--bottom-nav-height) + 44px);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 25;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0 20px;
      backdrop-filter: blur(12px);
    }

    .topbar-brand {
      width: 48px;
      height: 48px;
      padding: 3px;
      border-radius: 16px;
      flex-shrink: 0;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 36px rgba(56, 189, 248, 0.14);
    }

    .topbar-copy {
      flex: 1;
      min-width: 0;
    }

    .topbar-status {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .view-root {
      display: grid;
      gap: 18px;
    }

    .hero-card,
    .card,
    .modal-card,
    .day-panel,
    .calendar-card {
      background: var(--bg-elevated);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .hero-card {
      padding: 22px;
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: auto -10% -30% auto;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(124, 92, 191, 0.35), transparent 65%);
      z-index: -1;
    }

    .hero-headline {
      margin: 0;
      font-size: clamp(1.55rem, 3vw, 2.5rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      max-width: 18ch;
    }

    .hero-description {
      margin: 12px 0 0;
      color: var(--muted);
      max-width: 58ch;
      line-height: 1.6;
    }

    .hero-actions,
    .section-actions,
    .toolbar-group,
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hero-actions {
      margin-top: 18px;
    }

    .content-grid {
      display: grid;
      gap: 18px;
    }

    .content-grid.two-col {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .content-grid.dashboard-grid {
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    .stats-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      margin-top: 18px;
    }

    .stat-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .stat-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      margin: 10px 0 4px;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .stat-helper {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .card {
      padding: 20px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .card-title {
      margin: 0;
      font-size: 1.14rem;
      letter-spacing: -0.02em;
    }

    .card-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .soft-chip,
    .status-badge,
    .countdown-chip,
    .subject-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1;
      border: 1px solid transparent;
    }

    .soft-chip {
      background: var(--surface-soft);
      color: var(--text);
      border-color: var(--line);
    }

    .soft-chip strong {
      font-weight: 700;
    }

    .subject-badge {
      background: color-mix(in srgb, var(--badge-color, var(--accent)) 18%, transparent);
      color: var(--text);
      border-color: color-mix(in srgb, var(--badge-color, var(--accent)) 46%, transparent);
    }

    .subject-badge::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--badge-color, var(--accent));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--badge-color, var(--accent)) 18%, transparent);
    }

    .subject-badge.ghost {
      --badge-color: rgba(255, 255, 255, 0.2);
      color: var(--muted);
    }

    .status-badge.open {
      background: rgba(249, 115, 22, 0.16);
      color: #f9b777;
      border-color: rgba(249, 115, 22, 0.32);
    }

    .status-badge.done {
      background: rgba(34, 197, 94, 0.16);
      color: #78e5a0;
      border-color: rgba(34, 197, 94, 0.28);
    }

    .countdown-chip {
      background: rgba(250, 204, 21, 0.14);
      color: #fbe26a;
      border-color: rgba(250, 204, 21, 0.22);
    }

    .countdown-chip.today {
      background: rgba(239, 68, 68, 0.16);
      color: #ff9797;
      border-color: rgba(239, 68, 68, 0.28);
      animation: pulse 1.3s infinite;
    }

    .countdown-chip.overdue {
      background: rgba(239, 68, 68, 0.12);
      color: #ffaaa5;
      border-color: rgba(239, 68, 68, 0.2);
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.25);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
      }
    }

    .list-stack {
      display: grid;
      gap: 14px;
    }

    .mini-list {
      display: grid;
      gap: 10px;
    }

    .mini-item,
    .lesson-inline,
    .day-event,
    .list-item-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .mini-item-content,
    .day-event-content {
      flex: 1;
      min-width: 0;
    }

    .mini-item h4,
    .lesson-inline h4,
    .list-summary-title,
    .day-event h4 {
      margin: 0;
      font-size: 1rem;
    }

    .mini-item p,
    .lesson-inline p,
    .day-event p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .lesson-dot {
      width: 16px;
      height: 16px;
      margin-top: 4px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--dot-color, var(--accent));
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--dot-color, var(--accent)) 18%, transparent);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button,
    .ghost-button,
    .danger-button {
      min-height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      font-weight: 600;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: none;
    }

    .button {
      background: linear-gradient(135deg, rgba(124, 92, 191, 0.9), rgba(102, 126, 234, 0.86));
      color: #fff;
      box-shadow: 0 18px 30px rgba(124, 92, 191, 0.26);
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .ghost-button {
      background: rgba(255, 255, 255, 0.03);
      border-color: var(--line);
      color: var(--text);
    }

    .ghost-button:hover {
      background: rgba(124, 92, 191, 0.1);
      border-color: rgba(124, 92, 191, 0.26);
    }

    .danger-button {
      background: rgba(239, 68, 68, 0.12);
      color: #ffa6a6;
      border-color: rgba(239, 68, 68, 0.24);
    }

    .empty-state {
      padding: 32px 20px;
      text-align: center;
      border-radius: 18px;
      border: 1px dashed rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.02);
    }

    .empty-state .empty-icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 12px;
    }

    .empty-state h3 {
      margin: 0;
      font-size: 1.1rem;
    }

    .empty-state p {
      margin: 10px auto 0;
      max-width: 36ch;
      line-height: 1.55;
      color: var(--muted);
    }

    .section-toolbar {
      display: grid;
      gap: 14px;
    }

    .filter-bar {
      align-items: center;
    }

    .field,
    .toggle-card {
      display: grid;
      gap: 8px;
    }

    .field label,
    .toggle-copy strong {
      font-weight: 600;
    }

    .field span,
    .field small,
    .toggle-copy p {
      color: var(--muted);
      line-height: 1.5;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"],
    textarea,
    select {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
    }

    html[data-theme="light"] input[type="text"],
    html[data-theme="light"] input[type="date"],
    html[data-theme="light"] input[type="time"],
    html[data-theme="light"] textarea,
    html[data-theme="light"] select {
      background: rgba(15, 23, 42, 0.03);
    }

    input[type="text"]:focus,
    input[type="date"]:focus,
    input[type="time"]:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(124, 92, 191, 0.44);
      box-shadow: 0 0 0 4px rgba(124, 92, 191, 0.12);
    }

    textarea {
      min-height: 116px;
      resize: vertical;
    }

    input[type="color"] {
      width: 100%;
      min-height: 48px;
      padding: 8px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .form-grid.two {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .list-card {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .list-card.expanded {
      border-color: rgba(124, 92, 191, 0.28);
      box-shadow: 0 22px 40px rgba(15, 23, 42, 0.18);
    }

    .list-card-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 16px;
    }

    .item-summary {
      width: 100%;
      text-align: left;
      display: grid;
      gap: 12px;
      padding: 0;
    }

    .list-summary-head,
    .list-summary-meta,
    .inline-actions,
    .toggle-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .list-summary-meta {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .list-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.02);
    }

    .list-body > :first-child {
      padding-top: 14px;
    }

    .meta-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .meta-card {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .meta-card strong {
      display: block;
      margin-bottom: 6px;
    }

    .muted-text {
      color: var(--muted);
      line-height: 1.6;
    }

    .inline-note textarea {
      min-height: 102px;
    }

    .toggle-box,
    .task-check,
    .checklist-item input,
    .switch input {
      accent-color: var(--accent);
    }

    .checklist {
      display: grid;
      gap: 10px;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .checklist-item.done span {
      color: var(--muted);
      text-decoration: line-through;
    }

    .checklist-item span {
      flex: 1;
      min-width: 0;
    }

    .tiny-button {
      min-width: 34px;
      min-height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--muted);
    }

    .tiny-button:hover {
      color: var(--text);
      border-color: rgba(124, 92, 191, 0.24);
      background: rgba(124, 92, 191, 0.1);
    }

    .tiny-button.danger {
      color: #ffa6a6;
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.18);
    }

    .tiny-button.danger:hover {
      background: rgba(239, 68, 68, 0.18);

      gap: 12px;

      }
      to {

        transform: translateY(0);
      }

    .mobile-hidden {

    @media (min-width: 900px) {

      .hero-card,

      margin: 12mm;

    @media print {

      .topbar {

        background: transparent;

      .calendar-day,

      .list-card,
      .card,
      .hero-card {
        break-inside: avoid;
      }
    }
  </style>
</head>

    function startOfDay(date) {
      const copy = new Date(date);
      copy.setHours(0, 0, 0, 0);
      return copy;
    }

    function addDays(date, amount) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + amount);
      return copy;
    }

    function addMonths(date, amount) {
      const copy = new Date(date);
      copy.setMonth(copy.getMonth() + amount);
      return copy;
    }

    function formatISODate(date) {
      return startOfDay(date).toISOString().slice(0, 10);
    }

    function parseISODate(value) {
      return value ? new Date(value + "T00:00:00") : null;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function generateId(prefix) {
      return `${prefix}-${Math.random().toString(36).slice(2, 9)}-${Date.now().toString(36)}`;
    }

    function formatDate(dateValue, options = {}) {
      const date = typeof dateValue === "string" ? parseISODate(dateValue) : dateValue;
      return new Intl.DateTimeFormat("de-DE", options).format(date);
    }

    function formatDayAndDate(dateValue) {
      return formatDate(dateValue, {
        weekday: "long",
        day: "2-digit",
        month: "long"
      });
    }

    function formatShortDate(dateValue) {
      return formatDate(dateValue, {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
    }

    function formatMonthLabel(dateValue) {
      return formatDate(dateValue, {
        month: "long",
        year: "numeric"
      });
    }

    function formatWeekLabel(dateValue) {
      const start = startOfWeek(dateValue);
      const end = addDays(start, 6);
      const startLabel = formatDate(start, { day: "2-digit", month: "short" });
      const endLabel = formatDate(end, { day: "2-digit", month: "short", year: "numeric" });
      return `${startLabel} – ${endLabel}`;
    }

    function formatTimeRange(start, end) {
      return `${start} – ${end}`;
    }

    function weekdayForDate(dateValue) {
      const date = typeof dateValue === "string" ? parseISODate(dateValue) : dateValue;
      return DAY_NAMES[date.getDay()];
    }

    function startOfWeek(dateValue) {
      const date = startOfDay(typeof dateValue === "string" ? parseISODate(dateValue) : dateValue);
      const day = date.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      return addDays(date, diff);
    }

    function isSameDay(dateA, dateB) {
      return formatISODate(dateA) === formatISODate(dateB);
    }

    function todayIso() {
      return formatISODate(new Date());
    }

    function countdownInfo(dateValue) {
      const target = startOfDay(typeof dateValue === "string" ? parseISODate(dateValue) : dateValue);
      const diff = Math.round((target.getTime() - startOfDay(new Date()).getTime()) / 86400000);
      if (diff === 0) {
        return { text: "heute", className: "today" };
      }
      if (diff === 1) {
        return { text: "morgen", className: "" };
      }
      if (diff > 1) {
        return { text: `in ${diff} Tagen`, className: "" };
      }
      if (diff === -1) {
        return { text: "1 Tag überfällig", className: "overdue" };
      }
      return { text: `${Math.abs(diff)} Tage überfällig`, className: "overdue" };
    }

    function renderCountdown(dateValue) {
      const info = countdownInfo(dateValue);
      return `<span class="countdown-chip ${info.className}">${escapeHtml(info.text)}</span>`;
    }

    function normalizeState(candidate) {
      const fallback = createSampleState();
      const normalized = {
        subjects: Array.isArray(candidate?.subjects) ? candidate.subjects : fallback.subjects,
        homework: Array.isArray(candidate?.homework) ? candidate.homework : fallback.homework,
        exams: Array.isArray(candidate?.exams) ? candidate.exams : fallback.exams,
        timetable: Array.isArray(candidate?.timetable) ? candidate.timetable : fallback.timetable,
        drafts: candidate?.drafts && typeof candidate.drafts === "object" ? candidate.drafts : {},
        settings: {
          ...fallback.settings,
          ...(candidate?.settings || {})
        }
      };

      normalized.homework = normalized.homework.map((item) => ({
        ...item,
        status: item.status === "erledigt" ? "erledigt" : "offen",
        note: item.note || ""
      }));

      normalized.exams = normalized.exams.map((item) => ({
        ...item,
        note: item.note || "",
        topics: Array.isArray(item.topics) ? item.topics : [],
        learningChecklist: Array.isArray(item.learningChecklist)
          ? item.learningChecklist.map((entry) => {
              if (typeof entry === "string") {
                return { id: generateId("check"), text: entry, done: false };
              }
              return {
                id: entry.id || generateId("check"),
                text: entry.text || "",
                done: Boolean(entry.done)
              };
            })
          : []
      }));

      return normalized;
    }

    function persistLocalCache(nextState = state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        const sample = createSampleState();
        persistLocalCache(sample);
        return sample;
      }

      try {
        return normalizeState(JSON.parse(raw));
      } catch (error) {
        const sample = createSampleState();
        persistLocalCache(sample);
        return sample;
      }
    }

    async function fetchAdminJson(path) {
      const token = await getFreshIdToken();
      const response = await fetch(path, {
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: "application/json"
        }
      });

      if (response.status === 403) {
        appStatus.isAdmin = false;
        if (ui.section === "admin") {
          ui.section = "dashboard";
        }
        renderNav();
        renderApp();
        throw new Error("Kein Adminzugriff");

      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload?.error || "Adminbereich konnte nicht geladen werden.");
      }
      return payload;
    }

    function stopRemoteSubscription() {
      if (typeof appStatus.unsubscribeState === "function") {
        appStatus.unsubscribeState();
      }
      appStatus.unsubscribeState = null;
    }

    async function pushStateToCloud(nextState = state) {
      if (!appStatus.db || !appStatus.user) {
        return;
      }

      appStatus.syncState = "saving";
      renderTopbar();

      try {
        await setDoc(
          userDocRef(appStatus.user.uid),
          {
            state: normalizeState(nextState),
            updatedAt: serverTimestamp(),
            email: appStatus.user.email || ""
          },
          { merge: true }
        );
        appStatus.syncState = "ready";
        renderTopbar();
      } catch (error) {
        console.error(error);
        appStatus.syncState = "error";
        renderTopbar();
        showToast("Cloud-Speicherung fehlgeschlagen");
      }
    }

    function scheduleRemoteSave() {
      if (!appStatus.db || !appStatus.user || appStatus.isApplyingRemoteState) {
        return;
      }

      window.clearTimeout(appStatus.saveTimer);
      appStatus.saveTimer = window.setTimeout(() => {
        appStatus.saveTimer = null;
        pushStateToCloud(state);
      }, 700);
    }

    async function hydrateUserState(user) {
      stopRemoteSubscription();
      appStatus.user = user;
      appStatus.mode = "syncing";
      appStatus.syncState = "saving";
      renderApp();

      const approvalRef = doc(appStatus.db, "approvals", user.uid);
      const approvalSnapshot = await getDoc(approvalRef);
      if (!approvalSnapshot.exists() || approvalSnapshot.data()?.approved !== true) {
        stopRemoteSubscription();
        appStatus.mode = "pending_approval";
        appStatus.syncState = "ready";
        
        // Listen to approval changes so it updates automatically
        appStatus.unsubscribeState = onSnapshot(approvalRef, (snap) => {
          if (snap.exists() && snap.data()?.approved === true) {
            hydrateUserState(user); // Restart hydration when approved
          }
        });
        renderApp();
        return;
      }

      const ref = userDocRef(user.uid);
      const snapshot = await getDoc(ref);

      if (snapshot.exists() && snapshot.data()?.state) {
        state = normalizeState(snapshot.data().state);
        persistLocalCache(state);
      } else {
        state = normalizeState(loadState());
        persistLocalCache(state);
        await pushStateToCloud(state);
      }

      appStatus.unsubscribeState = onSnapshot(ref, (remoteSnapshot) => {
        if (!remoteSnapshot.exists() || !remoteSnapshot.data()?.state) {
          return;
        }

        appStatus.isApplyingRemoteState = true;
        state = normalizeState(remoteSnapshot.data().state);
        persistLocalCache(state);
        appStatus.syncState = remoteSnapshot.metadata.hasPendingWrites ? "saving" : "ready";
        appStatus.mode = "ready";
        renderApp();
        appStatus.isApplyingRemoteState = false;
      }, (error) => {
        console.error(error);
        appStatus.syncState = "error";
        renderTopbar();
        showToast("Live-Synchronisierung unterbrochen");
      });

      appStatus.mode = "ready";
      appStatus.syncState = "ready";
      await refreshAdminAccess();
      renderApp();
    }

    async function refreshAdminAccess() {
      if (!appStatus.user) {
        appStatus.isAdmin = false;
        appStatus.adminUsers = [];
        appStatus.adminDetail = null;
        if (ui.section === "admin") {
          ui.section = "dashboard";
        }
        renderNav();
        return;
      }

      try {
        const payload = await fetchAdminJson("/api/admin/users");
        appStatus.isAdmin = true;
        appStatus.adminUsers = Array.isArray(payload.users) ? payload.users : [];
        if (!ui.adminSelectedUid && appStatus.adminUsers[0]?.uid) {
          ui.adminSelectedUid = appStatus.adminUsers[0].uid;
        }
        renderNav();
        if (ui.section === "admin" && ui.adminSelectedUid) {
          await loadAdminUserDetail(ui.adminSelectedUid);
        }
      } catch (error) {
        appStatus.isAdmin = false;
        appStatus.adminUsers = [];
        appStatus.adminDetail = null;
        renderNav();
      }
    }

    async function loadAdminUserDetail(uid) {
      if (!uid) {
        appStatus.adminDetail = null;
        renderApp();
        return;
      }

      appStatus.adminLoading = true;
      renderApp();
      try {
        const payload = await fetchAdminJson(`/api/admin/users?uid=${encodeURIComponent(uid)}`);
        appStatus.adminDetail = payload.user || null;
      } catch (error) {
        console.error(error);
        showToast("Admin-Details konnten nicht geladen werden");
      } finally {
        appStatus.adminLoading = false;
        renderApp();
      }
    }

    async function startAuthentication() {
      try {
        const firebaseConfig = await loadFirebaseConfig();
        const firebaseApp = initializeApp(firebaseConfig);
        appStatus.auth = getAuth(firebaseApp);
        appStatus.db = getFirestore(firebaseApp);
        appStatus.provider = new GoogleAuthProvider();

        onAuthStateChanged(appStatus.auth, async (user) => {
          window.clearTimeout(appStatus.saveTimer);
          if (!user) {
            stopRemoteSubscription();
            appStatus.user = null;
            appStatus.isAdmin = false;
            appStatus.adminUsers = [];
            appStatus.adminDetail = null;
            appStatus.mode = "signed_out";
            appStatus.syncState = "offline";
            ui.adminSelectedUid = "";
            if (ui.section === "admin") {
              ui.section = "dashboard";
            }
            state = loadState();
            renderApp();
            return;
          }

          try {
            await hydrateUserState(user);
          } catch (error) {
            console.error(error);
            appStatus.mode = "signed_out";
            appStatus.syncState = "error";
            appStatus.configError = "Die Cloud-Daten konnten nicht geladen werden.";
            renderApp();
          }
        });
      } catch (error) {
        console.error(error);
        appStatus.mode = "config_error";
        appStatus.syncState = "error";
        appStatus.configError = error.message || "Firebase konnte nicht initialisiert werden.";
        renderApp();
      }
    }

    async function registerWithEmail(form) {
      if (!appStatus.auth) {
        showToast("Firebase ist noch nicht bereit");
        return;
      }

      const data = Object.fromEntries(new FormData(form).entries());
      const name = String(data.name || "").trim();
      const email = String(data.email || "").trim();
      const password = String(data.password || "");

      if (!name || !email || !password) {
        showToast("Bitte fülle alle Felder aus");
        return;
      }

      state.settings.name = name;
      persistLocalCache(state);

      try {
        const credential = await createUserWithEmailAndPassword(appStatus.auth, email, password);
        await updateProfile(credential.user, { displayName: name });
        showToast("Konto erstellt");
      } catch (error) {
        console.error(error);
        showToast(mapAuthError(error));
      }
    }

      } catch (error) {
        console.error(error);
        showToast("Abmeldung fehlgeschlagen");
      }
    }

    function saveState(options = {}) {
      const { silent = false, message = "Gespeichert ✓" } = options;
      persistLocalCache(state);
      scheduleRemoteSave();
      if (!silent) {
        showToast(message);
      }
    }

    function applyTheme() {
      const theme = state.settings.darkMode ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", theme);
    }

    function getSubject(subjectId) {
      return state.subjects.find((subject) => subject.id === subjectId) || null;
    }

    function draftKey(type, entityId = "new") {
      return `${type}:${entityId || "new"}`;
    }

    function getDraft(type, entityId = "new") {
      return state.drafts?.[draftKey(type, entityId)] || {};
    }

    function clearDraft(type, entityId = "new") {
      if (!state.drafts) {
        state.drafts = {};
      }
      delete state.drafts[draftKey(type, entityId)];
    }

    function updateDraftFromForm(form) {
      const type = form.dataset.draftForm;
      if (!type) {
        return;
      }
      const entityId = form.dataset.draftId || "new";
      const values = {};
      for (const [key, value] of new FormData(form).entries()) {
        values[key] = typeof value === "string" ? value : "";
      }
      if (!state.drafts) {
        state.drafts = {};
      }
      state.drafts[draftKey(type, entityId)] = values;
      saveState({ silent: true });
    }

    function sortByDate(items, key) {
      return [...items].sort((a, b) => {
        const aValue = a[key] || "";
        const bValue = b[key] || "";
        return aValue.localeCompare(bValue);
      });
    }

    function sortLessons(entries) {
      return [...entries].sort((a, b) => a.startTime.localeCompare(b.startTime));
    }

    function getLessonsForWeekday(weekday) {
      return sortLessons(state.timetable.filter((item) => item.weekday === weekday));
    }

    function renderSubjectBadge(subjectId) {
      const subject = getSubject(subjectId);
      if (!subject) {
        return `<span class="subject-badge ghost">Fach entfernt</span>`;
      }
      return `<span class="subject-badge" style="--badge-color:${escapeHtml(subject.color)}">${escapeHtml(subject.name)}</span>`;
    }

    function renderStatusBadge(status) {
      const isDone = status === "erledigt";
      return `<span class="status-badge ${isDone ? "done" : "open"}">${isDone ? "erledigt" : "offen"}</span>`;
    }

    function getDashboardData() {
      const today = todayIso();
      const todayWeekday = weekdayForDate(today);
      const todayLessons = getLessonsForWeekday(todayWeekday);
      const dueHomework = sortByDate(
        state.homework.filter((item) => item.status === "offen" && item.dueDate <= today),
        "dueDate"
      );
      const weekExams = sortByDate(
        state.exams.filter((exam) => {
          const diff = Math.round((parseISODate(exam.date).getTime() - parseISODate(today).getTime()) / 86400000);
          return diff >= 0 && diff <= 7;
        }),
        "date"
      );

      return { today, todayLessons, dueHomework, weekExams };
    }

    function lessonTopFromTime(time) {
      const [hour, minute] = time.split(":").map(Number);
      return ((hour - SCHEDULE_START_HOUR) + minute / 60) * HOUR_HEIGHT;
    }

    function lessonHeight(startTime, endTime) {
      const start = lessonTopFromTime(startTime);
      const end = lessonTopFromTime(endTime);
      return Math.max(end - start - 10, 42);
    }

    function renderScheduleBoard() {
      const today = weekdayForDate(new Date());
      const timeMarkers = Array.from({ length: SCHEDULE_END_HOUR - SCHEDULE_START_HOUR + 1 }, (_, index) => {
        const hour = SCHEDULE_START_HOUR + index;
        return `<div class="time-marker" style="top:${index * HOUR_HEIGHT - 12}px">${String(hour).padStart(2, "0")}:00</div>`;
      }).join("");

      const heads = WEEKDAYS.map((day) => `
        <div class="schedule-head-cell ${today === day ? "today" : ""}">
          <strong>${day}</strong>
          <span>${day === today ? "Heute" : "Unterricht"}</span>
        </div>
      `).join("");

      const columns = WEEKDAYS.map((day) => {
        const lessons = getLessonsForWeekday(day);
        const slots = Array.from({ length: SCHEDULE_END_HOUR - SCHEDULE_START_HOUR }, (_, index) => {
          const startHour = SCHEDULE_START_HOUR + index;
          return `
            <button
              class="slot-button"
              type="button"
              aria-label="Lektion hinzufügen"
              style="top:${index * HOUR_HEIGHT}px"
              data-action="open-lesson-modal"
              data-weekday="${day}"
              data-start-time="${String(startHour).padStart(2, "0")}:00"
              data-end-time="${String(startHour + 1).padStart(2, "0")}:00"
            ></button>
          `;
        }).join("");

        const lessonBlocks = lessons.map((lesson) => {
          const subject = getSubject(lesson.fachId);
          const top = lessonTopFromTime(lesson.startTime) + 5;
          return `
            <button
              class="lesson-block"
              type="button"
              style="top:${top}px;height:${lessonHeight(lesson.startTime, lesson.endTime)}px;--lesson-color:${escapeHtml(subject?.color || "#7c5cbf")}"
              data-action="open-lesson-modal"
              data-lesson-id="${lesson.id}"
            >
              <strong>${escapeHtml(subject?.name || "Fach fehlt")}</strong>
              <small>${escapeHtml(formatTimeRange(lesson.startTime, lesson.endTime))}<br>Raum ${escapeHtml(lesson.room || subject?.room || "—")}</small>
            </button>
          `;
        }).join("");

        return `<div class="day-column">${slots}${lessonBlocks}</div>`;
      }).join("");

      return `
        <div class="schedule-wrapper">
          <div class="schedule-board">
            <div class="schedule-corner"></div>
            ${heads}
            <div class="time-column">${timeMarkers}</div>
            ${columns}
          </div>
        </div>
      `;
    }

    function getEventsForDate(dateValue) {
      const iso = typeof dateValue === "string" ? dateValue : formatISODate(dateValue);
      const weekday = weekdayForDate(iso);
      const lessons = WEEKDAYS.includes(weekday)
        ? getLessonsForWeekday(weekday).map((lesson) => ({
            type: "lesson",
            label: "Stundenplan",
            start: lesson.startTime,
            title: getSubject(lesson.fachId)?.name || "Fach fehlt",
            description: `Raum ${lesson.room || getSubject(lesson.fachId)?.room || "—"}`,
            color: getSubject(lesson.fachId)?.color || "#7c5cbf"
          }))
        : [];

      const homework = state.homework
        .filter((item) => item.dueDate === iso)
        .map((item) => ({
          type: "homework",
          label: "Hausaufgabe",
          start: "08:00",
          title: item.title,
          description: item.status === "erledigt" ? "Bereits erledigt" : "Heute fällig",
          color: "#38bdf8"
        }));

      const exams = state.exams
        .filter((exam) => exam.date === iso)
        .map((exam) => ({
          type: "exam",
          label: "Prüfung",
          start: "09:00",
          title: exam.title,
          description: countdownInfo(exam.date).text,
          color: "#ef4444"
        }));

      return [...lessons, ...homework, ...exams].sort((a, b) => a.start.localeCompare(b.start));
    }

    function renderEventDots(dateValue) {
      const events = getEventsForDate(dateValue).slice(0, 6);
      if (!events.length) {
        return `<span class="muted-text">Kein Eintrag</span>`;
      }
      return events.map((event) => `<span class="event-dot" style="--dot-color:${escapeHtml(event.color)}"></span>`).join("");
    }

    function renderCalendarMonth() {
      const focus = ui.calendarDate;
      const monthStart = new Date(focus.getFullYear(), focus.getMonth(), 1);
      const gridStart = startOfWeek(monthStart);
      const days = Array.from({ length: 42 }, (_, index) => addDays(gridStart, index));
      const selectedIso = ui.selectedDay;
      const today = todayIso();

      return `
        <div class="calendar-grid month">
          ${CALENDAR_WEEKDAYS.map((day) => `<div class="calendar-weekday">${day}</div>`).join("")}
          ${days.map((day) => {
            const iso = formatISODate(day);
            const isMuted = day.getMonth() !== focus.getMonth();
            const compactEvents = getEventsForDate(iso).slice(0, 2);
            return `
              <button class="calendar-day ${isMuted ? "muted" : ""} ${iso === today ? "today" : ""} ${selectedIso === iso ? "selected" : ""}" type="button" data-action="select-calendar-day" data-date="${iso}">
                <strong>${day.getDate()}</strong>
                <div class="dot-row">${renderEventDots(iso)}</div>
                <div class="day-compact-events">
                  ${compactEvents.map((event) => `
                    <div class="day-compact-item">
                      <span class="event-dot" style="--dot-color:${escapeHtml(event.color)}"></span>
                      <span>${escapeHtml(event.title)}</span>
                    </div>
                  `).join("")}
                </div>
              </button>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderCalendarWeek() {
      const weekStart = startOfWeek(ui.calendarDate);
      const days = Array.from({ length: 7 }, (_, index) => addDays(weekStart, index));
      const today = todayIso();

      return `
        <div class="calendar-grid week">
          ${days.map((day) => {
            const iso = formatISODate(day);
            const events = getEventsForDate(iso);
            return `
              <button class="calendar-day ${iso === today ? "today" : ""} ${ui.selectedDay === iso ? "selected" : ""}" type="button" data-action="select-calendar-day" data-date="${iso}">
                <strong>${escapeHtml(formatDate(day, { weekday: "short", day: "2-digit", month: "2-digit" }))}</strong>
                <span>${events.length ? `${events.length} Einträge` : "Keine Termine"}</span>
                <div class="dot-row">${renderEventDots(iso)}</div>
                <div class="day-compact-events">
                  ${events.slice(0, 4).map((event) => `
                    <div class="day-compact-item">
                      <span class="event-dot" style="--dot-color:${escapeHtml(event.color)}"></span>
                      <span>${escapeHtml(event.start)} · ${escapeHtml(event.title)}</span>
                    </div>
                  `).join("")}
                </div>
              </button>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderCalendarDay() {
      const day = ui.calendarDate;
      const iso = formatISODate(day);
      const events = getEventsForDate(iso);
      return `
        <div class="calendar-day-view">
          <div class="calendar-card">
            <div class="calendar-title-row">
              <strong>${escapeHtml(formatDate(day, { weekday: "long", day: "2-digit", month: "long", year: "numeric" }))}</strong>

            ${events.length ? `
              <div class="list-stack">

                    <div class="day-event-content">
                      <div class="list-summary-head">
                        <strong>${escapeHtml(event.title)}</strong>
                        <span class="soft-chip">${escapeHtml(event.label)}</span>
                      </div>
                      <p>${escapeHtml(event.start)} · ${escapeHtml(event.description)}</p>

      `;
    }

    function activeCalendarPanelDate() {
      if (ui.calendarView === "day") {

    function renderCalendarPanel() {

                    </div>

                </div>

            </div>

    function renderView() {
      const root = document.getElementById("viewRoot");
      if (appStatus.mode !== "ready") {
        root.innerHTML = renderAuthView();
        return;
      }

      let content = "";
      if (ui.section === "dashboard") {
        content = renderDashboard();
      } else if (ui.section === "stundenplan") {
        content = renderStundenplan();
      } else if (ui.section === "hausaufgaben") {
        content = renderHomework();
      } else if (ui.section === "pruefungen") {
        content = renderExams();
      } else if (ui.section === "kalender") {
        content = renderCalendar();
      } else if (ui.section === "einstellungen") {
        content = renderSettings();
      } else if (ui.section === "admin") {
        content = renderAdmin();
      }

      root.innerHTML = content;
    }

    function renderFab() {
      const button = document.getElementById("fabButton");
      if (appStatus.mode !== "ready") {
        button.classList.add("hidden");
        button.dataset.action = "";
        button.textContent = "";
        return;
      }

      if (ui.section === "hausaufgaben") {
        button.classList.remove("hidden");
        button.textContent = "＋ Neue Hausaufgabe";
        button.dataset.action = "open-homework-modal";
      } else if (ui.section === "pruefungen") {
        button.classList.remove("hidden");
        button.textContent = "＋ Neue Prüfung";
        button.dataset.action = "open-exam-modal";
      } else {
        button.classList.add("hidden");
        button.dataset.action = "";
        button.textContent = "";
      }
    }

      return state.subjects.map((subject) => `

        title: "",

    function renderResetModal() {
      return `
        <div class="modal-card">
          <div class="modal-header">
            <div>
              <p class="eyebrow">Bestätigung</p>
              <h3 class="card-title">Alle Daten zurücksetzen?</h3>
              <p>Deine aktuellen Daten werden ersetzt. Anschließend werden die Beispieldaten lokal und in deiner Cloud neu angelegt.</p>
            </div>
            <button class="tiny-button" type="button" data-action="close-modal">✕</button>
          </div>
          <div class="button-row">
            <button class="danger-button" type="button" data-action="confirm-reset">Ja, alles zurücksetzen</button>
            <button class="ghost-button" type="button" data-action="close-modal">Abbrechen</button>
          </div>
        </div>
      `;
    }

    function renderModal() {
      const layer = document.getElementById("modalLayer");
      const root = document.getElementById("modalRoot");
      if (!ui.modal) {
        layer.classList.add("hidden");
        root.innerHTML = "";
        return;
      }

      let content = "";
      if (ui.modal.type === "homework") {
        content = renderHomeworkModal(ui.modal.homeworkId);
      } else if (ui.modal.type === "exam") {
        content = renderExamModal(ui.modal.examId);
      } else if (ui.modal.type === "lesson") {
        content = renderLessonModal(ui.modal.lessonId, ui.modal.preset || {});
      } else if (ui.modal.type === "subjects") {
        content = renderSubjectsModal(ui.modal.subjectId);
      } else if (ui.modal.type === "reset") {
        content = renderResetModal();
      }

      root.innerHTML = content;
      layer.classList.remove("hidden");
    }

    function renderApp() {
      applyTheme();
      renderNav();
      renderTopbar();
      renderView();
      renderFab();
      if (appStatus.mode === "ready") {
        renderModal();
      } else {
        ui.modal = null;
        renderModal();
      }
    }

    function closeModal() {
      ui.modal = null;
      renderModal();
    }

    function openModal(type, payload = {}) {
      ui.modal = { type, ...payload };
      renderModal();
    }

    function setSection(section) {
      ui.section = section;
      renderApp();
      if (section === "admin" && appStatus.isAdmin) {
        if (!appStatus.adminUsers.length) {
          refreshAdminAccess();
        } else if (ui.adminSelectedUid) {
          loadAdminUserDetail(ui.adminSelectedUid);
        }
      }
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function toggleHomeworkStatus(homeworkId, forceDone = null) {
      const item = state.homework.find((entry) => entry.id === homeworkId);
      if (!item) {
        return;
      }
      const nextStatus = forceDone === null ? (item.status === "offen" ? "erledigt" : "offen") : (forceDone ? "erledigt" : "offen");
      item.status = nextStatus;
      saveState();
      renderApp();
    }

    function deleteHomework(homeworkId) {
      const item = state.homework.find((entry) => entry.id === homeworkId);
      if (!item) {
        return;
      }
      if (!window.confirm(`Hausaufgabe "${item.title}" wirklich löschen?`)) {
        return;
      }
      state.homework = state.homework.filter((entry) => entry.id !== homeworkId);
      ui.expandedHomework.delete(homeworkId);
      saveState();
      renderApp();
    }

    function deleteExam(examId) {
      const exam = state.exams.find((entry) => entry.id === examId);
      if (!exam) {
        return;
      }
      if (!window.confirm(`Prüfung "${exam.title}" wirklich löschen?`)) {
        return;
      }
      state.exams = state.exams.filter((entry) => entry.id !== examId);
      ui.expandedExams.delete(examId);
      saveState();
      renderApp();
    }

    function deleteLesson(lessonId) {
      const lesson = state.timetable.find((entry) => entry.id === lessonId);
      if (!lesson) {
        return;
      }
      if (!window.confirm("Diese Lektion wirklich löschen?")) {
        return;
      }
      state.timetable = state.timetable.filter((entry) => entry.id !== lessonId);
      saveState();
      closeModal();
      renderApp();
    }

    function deleteSubject(subjectId) {
      const subject = getSubject(subjectId);
      if (!subject) {
        return;
      }
      const homeworkCount = state.homework.filter((entry) => entry.fachId === subjectId).length;
      const examCount = state.exams.filter((entry) => entry.fachId === subjectId).length;
      const lessonCount = state.timetable.filter((entry) => entry.fachId === subjectId).length;
      const confirmed = window.confirm(
        `Fach "${subject.name}" löschen?\n\nDavon betroffen:\n- ${homeworkCount} Hausaufgaben\n- ${examCount} Prüfungen\n- ${lessonCount} Lektionen`
      );

      if (!confirmed) {
        return;
      }

      state.subjects = state.subjects.filter((entry) => entry.id !== subjectId);
      state.homework = state.homework.filter((entry) => entry.fachId !== subjectId);
      state.exams = state.exams.filter((entry) => entry.fachId !== subjectId);
      state.timetable = state.timetable.filter((entry) => entry.fachId !== subjectId);
      saveState();
      openModal("subjects");
      renderApp();
    }

    function saveHomeworkFromForm(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      const payload = {
        fachId: data.fachId,
        title: data.title.trim(),
        description: data.description.trim(),
        dueDate: data.dueDate,
        note: data.note.trim()
      };

      if (data.id) {
        const existing = state.homework.find((item) => item.id === data.id);
        Object.assign(existing, payload);
        clearDraft("homework", data.id);
      } else {
        state.homework.unshift({
          id: generateId("hw"),
          ...payload,
          status: "offen",
          createdAt: new Date().toISOString()
        });
        clearDraft("homework", "new");
      }

      saveState();
      closeModal();
      renderApp();
    }

    function saveExamFromForm(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      const topics = data.topics
        .split(",")
        .map((topic) => topic.trim())
        .filter(Boolean);

      if (data.id) {
        const existing = state.exams.find((item) => item.id === data.id);
        existing.fachId = data.fachId;
        existing.title = data.title.trim();
        existing.date = data.date;
        existing.topics = topics;
        existing.note = data.note.trim();

        const existingTexts = new Set(existing.learningChecklist.map((entry) => entry.text));
        topics.forEach((topic) => {
          const defaultStep = `${topic} wiederholen`;
          if (!existingTexts.has(defaultStep)) {
            existing.learningChecklist.push({
              id: generateId("check"),
              text: defaultStep,
              done: false
            });
          }
        });
        clearDraft("exam", data.id);
      } else {
        state.exams.push({
          id: generateId("exam"),
          fachId: data.fachId,
          title: data.title.trim(),
          date: data.date,
          topics,
          learningChecklist: topics.map((topic) => ({
            id: generateId("check"),
            text: `${topic} wiederholen`,
            done: false
          })),
          note: data.note.trim(),
          createdAt: new Date().toISOString()
        });
        clearDraft("exam", "new");
      }

      saveState();
      closeModal();
      renderApp();
    }

    function hasLessonOverlap(candidate) {
      const candidateStart = candidate.startTime;
      const candidateEnd = candidate.endTime;
      return state.timetable.some((lesson) => {
        if (lesson.weekday !== candidate.weekday || lesson.id === candidate.id) {
          return false;
        }
        return candidateStart < lesson.endTime && candidateEnd > lesson.startTime;
      });
    }

    function saveLessonFromForm(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      if (data.startTime >= data.endTime) {
        showToast("Endzeit muss nach der Startzeit liegen");
        return;
      }

      const subject = getSubject(data.fachId);
      const candidate = {
        id: data.id,
        weekday: data.weekday,
        fachId: data.fachId,
        startTime: data.startTime,
        endTime: data.endTime,
        room: data.room.trim() || subject?.room || ""
      };

      if (hasLessonOverlap(candidate)) {
        showToast("Zeitblock überschneidet sich bereits");
        return;
      }

      if (data.id) {
        const existing = state.timetable.find((item) => item.id === data.id);
        Object.assign(existing, candidate);
        clearDraft("lesson", data.id);
      } else {
        state.timetable.push({
          ...candidate,
          id: generateId("lesson")
        });
        clearDraft("lesson", "new");
      }

      saveState();
      closeModal();
      renderApp();
    }

    function saveSubjectFromForm(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      const payload = {
        name: data.name.trim(),
        color: data.color,
        teacher: data.teacher.trim(),
        room: data.room.trim()
      };

      if (data.id) {
        const existing = state.subjects.find((subject) => subject.id === data.id);
        Object.assign(existing, payload);
        clearDraft("subject", data.id);
      } else {
        state.subjects.push({
          id: generateId("subject"),
          ...payload
        });
        clearDraft("subject", "new");
      }

      saveState();
      openModal("subjects");
      renderApp();
    }

    function shiftCalendar(direction) {
      const step = Number(direction);
      if (ui.calendarView === "month") {
        ui.calendarDate = addMonths(ui.calendarDate, step);
      } else if (ui.calendarView === "week") {
        ui.calendarDate = addDays(ui.calendarDate, step * 7);
      } else {
        ui.calendarDate = addDays(ui.calendarDate, step);
      }
      if (ui.calendarView !== "day") {
        ui.selectedDay = null;
      }
      renderApp();
    }

    function handleAction(button) {
      const action = button.dataset.action;
      if (action === "set-auth-mode") {
        ui.authMode = button.dataset.authMode || "signin";
        renderApp();
        return;
      }

      if (action === "sign-in-google") {
        signInWithGoogle();
        return;
      }

      if (action === "admin-toggle-approval") {
        if (!appStatus.isAdmin) return;
        const uid = button.dataset.uid;
        const approved = button.dataset.approved === "true";
        button.disabled = true;
        try {
          const token = await getFreshIdToken();
          await fetch("/api/admin/approve", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ uid, approved })
          });
          showToast("Status aktualisiert");
          await refreshAdminAccess();
          renderApp();
        } catch (error) {
          console.error(error);
          showToast("Aktualisierung fehlgeschlagen");
          button.disabled = false;
        }
        return;
      }

      if (action === "sign-out") {
        logOut();
        return;
      }

      if (action === "log-out") {
        logOut();
        return;
      }

      if (action === "refresh-admin") {
        refreshAdminAccess().then(() => {
          if (ui.adminSelectedUid) {
            loadAdminUserDetail(ui.adminSelectedUid);
          }
        });
        return;
      }

      if (action === "select-admin-user") {
        ui.adminSelectedUid = button.dataset.adminUid || "";
        loadAdminUserDetail(ui.adminSelectedUid);
        return;
      }

      if (action === "toggle-sidebar") {
        ui.sidebarCollapsed = !ui.sidebarCollapsed;
        renderNav();
        return;
      }

      if (action === "print") {
        window.print();
        return;
      }

      if (action === "close-modal") {
        closeModal();
        return;
      }

      if (action === "open-homework-modal") {
        openModal("homework", { homeworkId: button.dataset.homeworkId || "" });
        return;
      }

      if (action === "open-exam-modal") {
        openModal("exam", { examId: button.dataset.examId || "" });
        return;
      }

      if (action === "open-lesson-modal") {
        openModal("lesson", {
          lessonId: button.dataset.lessonId || "",
          preset: {
            weekday: button.dataset.weekday,
            startTime: button.dataset.startTime,
            endTime: button.dataset.endTime
          }
        });
        return;
      }

      if (action === "open-subject-manager") {
        openModal("subjects", { subjectId: button.dataset.subjectId || "" });
        return;
      }

      if (action === "toggle-homework-expand") {
        const id = button.dataset.homeworkId;
        ui.expandedHomework.has(id) ? ui.expandedHomework.delete(id) : ui.expandedHomework.add(id);
        renderApp();
        return;
      }

      if (action === "toggle-exam-expand") {
        const id = button.dataset.examId;
        ui.expandedExams.has(id) ? ui.expandedExams.delete(id) : ui.expandedExams.add(id);
        renderApp();
        return;
      }

      if (action === "complete-homework") {
        toggleHomeworkStatus(button.dataset.homeworkId, true);
        return;
      }

      if (action === "delete-homework") {
        deleteHomework(button.dataset.homeworkId);
        return;
      }

      if (action === "delete-exam") {
        deleteExam(button.dataset.examId);
        return;
      }

      if (action === "delete-lesson") {
        deleteLesson(button.dataset.lessonId);
        return;
      }

      if (action === "delete-subject") {
        deleteSubject(button.dataset.subjectId);
        return;
      }

      if (action === "delete-checklist-item") {
        const exam = state.exams.find((entry) => entry.id === button.dataset.examId);
        if (!exam) {
          return;
        }
        exam.learningChecklist = exam.learningChecklist.filter((entry) => entry.id !== button.dataset.checkId);
        saveState();
        renderApp();
        return;
      }

      if (action === "set-calendar-view") {
        ui.calendarView = button.dataset.view;
        if (ui.calendarView === "day") {
          ui.calendarDate = ui.selectedDay ? parseISODate(ui.selectedDay) : startOfDay(new Date());
        }
        renderApp();
        return;
      }

      if (action === "shift-calendar") {
        shiftCalendar(button.dataset.direction);
        return;
      }

      if (action === "go-calendar-today") {
        ui.calendarDate = startOfDay(new Date());
        if (ui.calendarView !== "day") {
          ui.selectedDay = null;
        }
        renderApp();
        return;
      }

      if (action === "select-calendar-day") {
        ui.selectedDay = button.dataset.date;
        ui.calendarDate = parseISODate(button.dataset.date);
        renderApp();
        return;
      }

      if (action === "close-calendar-panel") {
        ui.selectedDay = null;
        renderApp();
        return;
      }

      if (action === "open-reset-modal") {
        openModal("reset");
        return;
      }

      if (action === "confirm-reset") {
        state = createSampleState();
        ui.expandedHomework.clear();
        ui.expandedExams.clear();
        ui.selectedDay = null;
        saveState({ message: "Daten wurden zurückgesetzt" });
        closeModal();
        renderApp();
      }
    }

    document.addEventListener("click", (event) => {
      const navTarget = event.target.closest("[data-section]");
      if (navTarget) {
        setSection(navTarget.dataset.section);
        return;
      }

      const actionTarget = event.target.closest("[data-action]");
      if (actionTarget) {
        handleAction(actionTarget);
      }
    });

    document.addEventListener("submit", (event) => {
      const form = event.target;
      event.preventDefault();
      if (form.matches('[data-form="auth-signup"]')) {
        registerWithEmail(form);
      } else if (form.matches('[data-form="auth-signin"]')) {
        signInWithEmail(form);
      } else if (form.matches('[data-form="homework"]')) {
        saveHomeworkFromForm(form);
      } else if (form.matches('[data-form="exam"]')) {
        saveExamFromForm(form);
      } else if (form.matches('[data-form="lesson"]')) {
        saveLessonFromForm(form);
      } else if (form.matches('[data-form="subject"]')) {
        saveSubjectFromForm(form);
      } else if (form.matches('[data-form="checklist-item"]')) {
        const exam = state.exams.find((entry) => entry.id === form.dataset.examId);
        if (!exam) {
          return;
        }
        const text = new FormData(form).get("checkText").trim();
        if (!text) {
          return;
        }
        exam.learningChecklist.push({ id: generateId("check"), text, done: false });
        saveState();
        renderApp();
      }
    });

    document.addEventListener("change", (event) => {
      const target = event.target;

      if (target.matches("[data-homework-status]")) {
        toggleHomeworkStatus(target.dataset.homeworkStatus, target.checked);
        return;
      }

      if (target.matches("[data-exam-check]")) {
        const [examId, checkId] = target.dataset.examCheck.split("::");
        const exam = state.exams.find((entry) => entry.id === examId);
        const checklistItem = exam?.learningChecklist.find((entry) => entry.id === checkId);
        if (!checklistItem) {
          return;
        }
        checklistItem.done = target.checked;
        saveState();
        renderApp();
        return;
      }

      if (target.matches("[data-filter='homework-subject']")) {
        ui.homeworkFilterSubject = target.value;
        renderApp();
        return;
      }

      if (target.matches("[data-filter='homework-status']")) {
        ui.homeworkFilterStatus = target.value;
        renderApp();
        return;
      }

      if (target.matches("[data-setting-toggle='darkMode']")) {
        state.settings.darkMode = target.checked;
        saveState({ silent: false });
        applyTheme();
        return;
      }

      if (target.matches("[data-setting-toggle='erinnerungen']")) {
        state.settings.erinnerungen = target.checked;
        saveState();
      }

      const draftForm = target.closest("[data-draft-form]");
      if (draftForm) {
        updateDraftFromForm(draftForm);
      }
    });

    document.addEventListener("input", (event) => {
      const target = event.target;

      if (target.matches("[data-note-type='homework']")) {
        const item = state.homework.find((entry) => entry.id === target.dataset.itemId);
        if (!item) {
          return;
        }
        item.note = target.value;
        saveState();
        return;
      }

      if (target.matches("[data-note-type='exam']")) {
        const exam = state.exams.find((entry) => entry.id === target.dataset.itemId);
        if (!exam) {
          return;
        }
        exam.note = target.value;
        saveState();
        return;
      }

      if (target.matches("[data-setting='name']")) {
        state.settings.name = target.value;
        saveState();
        return;
      }

      if (target.matches("[data-setting='klasse']")) {
        state.settings.klasse = target.value;
        saveState();
      }

      const draftForm = target.closest("[data-draft-form]");
      if (draftForm) {
        updateDraftFromForm(draftForm);
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && ui.modal) {
        closeModal();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden" && appStatus.saveTimer) {
        window.clearTimeout(appStatus.saveTimer);
        appStatus.saveTimer = null;
        pushStateToCloud(state);
      }
    });

    renderApp();
    startAuthentication();
  </script>
</body>
</html>
